global:
  scrape_interval: 5s

scrape_configs:

  - job_name: users
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - users-service:3000

  - job_name: products
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - products-service:3000

  - job_name: orders
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - orders-service:3000